<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Junior Store | متجر اللابتوبات الأول{% endblock %}</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <style>
    /* ألوان Junior Store العصرية */
    :root {
        --primary-color: #0d6efd; /* أزرق تقني */
        --primary-hover: #0a58ca;
        --accent-color: #ff2a5f;  /* أحمر/وردي عصري لزر السلة */
        --bg-color: #f4f6f9;
        --text-color: #2b3445;
        --navbar-bg: #ffffff;
        --card-bg: #ffffff;
        --border-radius-lg: 1.2rem;
        --transition: all 0.3s ease;
    }

    body { 
        font-family: 'Tajawal', sans-serif; 
        background-color: var(--bg-color); 
        color: var(--text-color);
        display: flex;
        flex-direction: column;
        min-height: 100vh;
    }

    /* Navbar Styling */
    .navbar-custom {
        background-color: var(--navbar-bg);
        box-shadow: 0 2px 15px rgba(0,0,0,0.05);
        border-bottom: 2px solid var(--primary-color);
    }
    .navbar-brand {
        color: var(--primary-color) !important;
        font-weight: 800;
        font-size: 1.8rem;
        letter-spacing: -0.5px;
    }
    .nav-link {
        color: var(--text-color);
        font-weight: 600;
        font-size: 1.1rem;
        transition: var(--transition);
        padding: 0.5rem 1rem;
    }
    .nav-link:hover {
        color: var(--primary-color);
    }

    /* Buttons */
    .btn-accent {
        background-color: var(--accent-color);
        color: white;
        border: none;
        border-radius: 50px;
        transition: var(--transition);
    }
    .btn-accent:hover {
        background-color: #e01b4c;
        color: white;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(255, 42, 95, 0.3);
    }

    main { flex: 1; }
    
    /* Footer */
    footer {
        background-color: #2b3445;
        color: white;
    }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-custom sticky-top py-3">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2" href="{% url 'ProductsList' %}">
                <i class="bi bi-laptop text-primary"></i>
                Junior <span style="color: var(--text-color);">Store</span>
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'ProductsList' %}">الرئيسية</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#products">المنتجات</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#contact">تواصل معنا</a>
                    </li>
                </ul>
                <div class="d-flex align-items-center gap-3">
                    <a href="{% url 'cart_view' %}" class="btn btn-accent fw-bold px-4 py-2 d-flex align-items-center gap-2">
                        <i class="bi bi-cart3 fs-5"></i> 
                        <span>السلة</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="py-4">
        {% block content %}{% endblock %}
    </main>

    <footer id="contact" class="py-5 mt-auto">
        <div class="container">
            <div class="row gy-4">
                <div class="col-md-4 text-center text-md-start">
                    <h4 class="fw-bold mb-3 text-primary"><i class="bi bi-laptop"></i> Junior Store</h4>
                    <p class="text-white-50">وجهتك الأولى والأفضل لشراء أحدث أجهزة اللابتوب بأفضل الأسعار وأعلى جودة.</p>
                </div>
                <div class="col-md-4 text-center">
                    <h5 class="fw-bold mb-3">تواصل معنا</h5>
                    <div class="d-flex justify-content-center gap-3 fs-4">
                        <a href="#" class="text-white-50 text-decoration-none hover-primary"><i class="bi bi-whatsapp"></i></a>
                        <a href="#" class="text-white-50 text-decoration-none hover-primary"><i class="bi bi-facebook"></i></a>
                        <a href="#" class="text-white-50 text-decoration-none hover-primary"><i class="bi bi-instagram"></i></a>
                    </div>
                </div>
                <div class="col-md-4 text-center text-md-end text-white-50 fw-semibold">
                    <p class="mb-0 mt-4">© 2026 Junior Store. جميع الحقوق محفوظة.</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
