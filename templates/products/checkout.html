{% extends 'base.html' %}

{% block title %}إتمام الطلب | لابتوب ستور{% endblock %}

{% block extra_css %}
<style>
    .checkout-wrapper {
        max-width: 850px;
        margin: 0 auto;
    }
    .checkout-header {
        background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
        padding: 2rem 1.5rem;
        border-top-left-radius: var(--border-radius-lg);
        border-top-right-radius: var(--border-radius-lg);
    }
    .form-control-custom {
        border: 2px solid transparent;
        background-color: var(--bg-light);
        transition: var(--transition);
        border-radius: 0.75rem;
    }
    .form-control-custom:focus {
        border-color: #25D366;
        background-color: #fff;
        box-shadow: 0 0 0 4px rgba(37, 211, 102, 0.1);
    }
    .btn-whatsapp {
        background-color: #25D366;
        color: white;
        border: none;
        transition: var(--transition);
    }
    .btn-whatsapp:hover {
        background-color: #1DA851;
        color: white;
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(37, 211, 102, 0.2);
    }
</style>
{% endblock %}

{% block content %}
<div class="container py-5">
    
    <div class="checkout-wrapper">
        <div class="d-flex justify-content-center align-items-center mb-5 text-muted fw-bold">
            <span class="d-flex align-items-center gap-2"><i class="bi bi-cart-check fs-5"></i> السلة</span>
            <div class="mx-3 border-top border-2 border-success" style="width: 40px;"></div>
            <span class="d-flex align-items-center gap-2 text-success"><i class="bi bi-whatsapp fs-5"></i> إرسال عبر واتساب</span>
        </div>

        <div class="card border-0 shadow-lg rounded-4 overflow-hidden mb-4">
            <div class="checkout-header text-white text-center text-md-start d-flex flex-column flex-md-row align-items-center justify-content-between gap-3">
                <div>
                    <h4 class="mb-1 fw-bold"><i class="bi bi-person-lines-fill me-2"></i> بيانات التوصيل</h4>
                    <p class="mb-0 text-white-50 small">أدخل بياناتك وسيتم تسجيل طلبك وتوجيهك لواتساب لإتمامه مباشرة.</p>
                </div>
                <div class="bg-white bg-opacity-25 rounded-circle p-3 d-none d-md-block">
                    <i class="bi bi-whatsapp fs-2 text-white"></i>
                </div>
            </div>

            <div class="card-body p-4 p-md-5 bg-white">
                <form method="POST" action="{% url 'checkout' %}">
                    {% csrf_token %}
                    
                    <div class="row g-4 mb-4">
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="text" class="form-control form-control-custom" id="name" name="name" placeholder="الاسم الكامل" required>
                                <label for="name" class="text-muted"><i class="bi bi-person me-1"></i> الاسم الكامل</label>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="tel" class="form-control form-control-custom" id="phone" name="phone" placeholder="05xxxxxxxx" required dir="ltr" style="text-align: right;">
                                <label for="phone" class="text-muted"><i class="bi bi-telephone me-1"></i> رقم الهاتف</label>
                            </div>
                        </div>

                        <div class="col-12">
                            <div class="form-floating">
                                <textarea class="form-control form-control-custom" id="address" name="address" placeholder="المدينة، الحي..." style="height: 120px" required></textarea>
                                <label for="address" class="text-muted"><i class="bi bi-geo-alt me-1"></i> عنوان التوصيل التفصيلي</label>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex flex-column flex-md-row align-items-center justify-content-between gap-3 border-top pt-4">
                        <a href="{% url 'cart_view' %}" class="btn btn-link text-decoration-none text-muted fw-bold hover-primary order-2 order-md-1">
                            <i class="bi bi-arrow-right me-1"></i> العودة للسلة
                        </a>
                        
                        <button type="submit" class="btn btn-whatsapp btn-lg rounded-pill fw-bold shadow-sm px-5 order-1 order-md-2 hover-scale w-100 w-md-auto d-flex justify-content-center align-items-center gap-2">
                            <span>تأكيد الطلب 🛍️</span>
                            <i class="bi bi-whatsapp"></i>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
