<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم المتجر ⚙️</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bs-primary: #696cff; /* لون Materio البنفسجي الساحر */
            --bs-body-bg: #f5f5f9;
            --bs-text-color: #566a7f;
            --bs-card-shadow: 0 0.125rem 0.25rem rgba(161, 172, 184, 0.12);
        }
        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bs-body-bg);
            color: var(--bs-text-color);
            overflow-x: hidden;
        }
        
        /* ---------------- Sidebar ---------------- */
        #sidebar {
            width: 260px;
            position: fixed;
            top: 0;
            right: 0;
            height: 100vh;
            background: #fff;
            box-shadow: var(--bs-card-shadow);
            z-index: 1030;
            transition: 0.3s;
        }
        .sidebar-header {
            padding: 1.5rem;
            display: flex;
            align-items: center;
        }
        .sidebar-logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: #566a7f;
            text-decoration: none;
        }
        .sidebar-logo i { color: var(--bs-primary); margin-left: 8px; }
        
        .menu-inner { padding: 0; margin: 0; list-style: none; }
        .menu-header {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.04rem;
            color: #a1acb8;
            margin: 1.5rem 2rem 0.5rem;
            font-weight: 600;
        }
        .menu-item { margin: 0.2rem 1rem; }
        .menu-link {
            display: flex;
            align-items: center;
            padding: 0.625rem 1rem;
            border-radius: 0.375rem;
            color: #697a8d;
            text-decoration: none;
            transition: background-color 0.15s, color 0.15s;
            font-weight: 600;
        }
        .menu-link i { font-size: 1.25rem; margin-left: 10px; }
        
        .menu-item:hover .menu-link {
            background-color: rgba(67, 89, 113, 0.04);
            color: #697a8d;
        }
        .menu-item.active .menu-link {
            background-color: var(--bs-primary);
            color: #fff;
            box-shadow: 0 2px 4px rgba(105, 108, 255, 0.4);
        }

        /* ---------------- Main Content ---------------- */
        .layout-page {
            margin-right: 260px;
            padding: 1.5rem;
            min-height: 100vh;
            transition: 0.3s;
        }

        /* ---------------- Navbar ---------------- */
        .navbar-custom {
            background: #fff;
            border-radius: 0.5rem;
            box-shadow: var(--bs-card-shadow);
            padding: 0.75rem 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .search-box {
            border: none;
            background: transparent;
            outline: none;
            padding: 0.5rem;
            width: 250px;
            color: var(--bs-text-color);
        }

        /* ---------------- Cards ---------------- */
        .card {
            border: 0;
            box-shadow: var(--bs-card-shadow);
            border-radius: 0.5rem;
            background-clip: padding-box;
            background-color: #fff;
        }
        .text-primary { color: var(--bs-primary) !important; }
        .btn-primary { background-color: var(--bs-primary); border-color: var(--bs-primary); }
        .btn-primary:hover { background-color: #5f61e6; border-color: #5f61e6; }
        .btn-outline-primary { color: var(--bs-primary); border-color: var(--bs-primary); }
        .btn-outline-primary:hover { background-color: var(--bs-primary); color: #fff; }
    </style>
</head>
<body>

    <aside id="sidebar">
        <div class="sidebar-header">
            <a href="{% url 'dashboard' %}" class="sidebar-logo">
                <i class="bi bi-laptop"></i> TechStore
            </a>
        </div>

        <ul class="menu-inner">
            <li class="menu-header">الرئيسية</li>
            <li class="menu-item active">
                <a href="{% url 'dashboard' %}" class="menu-link">
                    <i class="bi bi-house-door"></i> <div>لوحة القيادة</div>
                </a>
            </li>
            
            <li class="menu-header">إدارة المتجر</li>
            <li class="menu-item">
                <a href="{% url 'dashboard_orders' %}" class="menu-link">
                    <i class="bi bi-cart-check"></i> <div>الطلبات</div>
                </a>
            </li>
            <li class="menu-item">
                <a href="{% url 'dashboard_inventory' %}" class="menu-link">
                    <i class="bi bi-box-seam"></i> <div>المخزون</div>
                </a>
            </li>
            <li class="menu-item">
                <a href="{% url 'dashboard_reports' %}" class="menu-link">
                    <i class="bi bi-graph-up-arrow"></i> <div>التقارير والأرباح</div>
                </a>
            </li>

            <li class="menu-header">روابط خارجية</li>
            <li class="menu-item">
                <a href="{% url 'ProductsList' %}" class="menu-link text-success">
                    <i class="bi bi-shop-window"></i> <div>عرض المتجر</div>
                </a>
            </li>
        </ul>
    </aside>

    <div class="layout-page">
        <nav class="navbar-custom">
            <div class="d-flex align-items-center">
                <i class="bi bi-search fs-4 text-muted"></i>
                <input type="text" class="search-box ms-2" placeholder="بحث...">
            </div>
            <div class="d-flex align-items-center gap-3">
                <a href="#" class="text-muted"><i class="bi bi-github fs-4"></i></a>
                <a href="#" class="text-muted"><i class="bi bi-bell fs-4"></i></a>
                <a href="#" class="text-muted"><i class="bi bi-moon fs-4"></i></a>
                <img src="https://ui-avatars.com/api/?name=Admin&background=696cff&color=fff" alt="Avatar" class="rounded-circle" width="40">
            </div>
        </nav>

        {% block dashboard_content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
